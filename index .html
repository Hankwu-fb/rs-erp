<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Excel风格进销存管理系统</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--blue:#2563eb;--green:#059669;--red:#dc2626;--orange:#d97706;--bg:#f1f5f9;--white:#fff;--border:#e2e8f0;--text:#1e293b;--muted:#64748b}
body{font-family:'Segoe UI','Microsoft YaHei',sans-serif;background:var(--bg);height:100vh;display:flex;flex-direction:column;overflow:hidden}
/* Header */
.hd{background:linear-gradient(135deg,#1e40af,#2563eb);color:#fff;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.hd-title{font-size:17px;font-weight:700;letter-spacing:.5px}
.hd-info{font-size:11px;opacity:.8}
/* Tabs */
.tabs{background:#fff;border-bottom:2px solid var(--border);padding:0 16px;display:flex;gap:2px;flex-shrink:0}
.tab{padding:10px 18px;font-size:13px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;user-select:none}
.tab:hover{color:var(--blue);background:#f8fafc}
.tab.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:600}
/* Toolbar */
.tb{background:#fff;padding:8px 16px;border-bottom:1px solid var(--border);display:flex;gap:6px;align-items:center;flex-wrap:wrap;flex-shrink:0}
.btn{padding:5px 12px;border-radius:5px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--text);transition:all .15s;display:flex;align-items:center;gap:4px}
.btn:hover{background:#f8fafc;border-color:#94a3b8}
.btn.primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn.primary:hover{background:#1d4ed8}
.btn.success{background:var(--green);color:#fff;border-color:var(--green)}
.btn.danger{background:var(--red);color:#fff;border-color:var(--red)}
.btn.warn{background:var(--orange);color:#fff;border-color:var(--orange)}
.sep{width:1px;height:20px;background:var(--border);margin:0 2px}
/* Main */
.main{flex:1;overflow:hidden;display:flex;flex-direction:column;padding:10px;gap:8px}
/* Stats */
.stats{display:flex;gap:8px;flex-shrink:0}
.stat{background:#fff;border-radius:8px;padding:8px 14px;display:flex;align-items:center;gap:10px;border:1px solid var(--border)}
.stat-icon{font-size:20px}
.stat-val{font-size:16px;font-weight:700;color:var(--text)}
.stat-lbl{font-size:10px;color:var(--muted)}
/* Table container */
.tbl-wrap{flex:1;background:#fff;border-radius:8px;border:1px solid var(--border);overflow:hidden;display:flex;flex-direction:column}
.tbl-scroll{flex:1;overflow:auto}
table{border-collapse:collapse;font-size:12px;width:100%;min-width:100%}
thead{position:sticky;top:0;z-index:10}
thead tr{background:#f8fafc}
th{border:1px solid #d1d5db;padding:0;height:36px;font-weight:600;color:#374151;white-space:nowrap;position:relative;background:#f1f5f9}
th.th-num{width:40px;min-width:40px;background:#e2e8f0;cursor:default}
th.th-ops{width:56px;min-width:56px;background:#e2e8f0;cursor:default}
th.th-col{cursor:move}
th.th-calc{background:#fef9c3}
.th-inner{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:0 4px}
.th-letter{font-size:9px;color:#94a3b8;line-height:1}
.th-input{border:none;background:transparent;font-size:12px;font-weight:600;color:#374151;text-align:center;width:100%;outline:none;padding:2px 0;cursor:text}
th.th-col:hover .th-input{background:#e0e7ff}
tbody tr:nth-child(even){background:#fafafa}
tbody tr:hover{background:#eff6ff!important}
td{border:1px solid #e5e7eb;padding:0;height:32px;vertical-align:middle;position:relative}
td.td-num{background:#f8fafc;color:#94a3b8;font-size:11px;text-align:center;width:40px}
td.td-ops{width:56px;text-align:center}
.cell-in{width:100%;height:100%;border:none;padding:0 6px;font-size:12px;background:transparent;outline:none;color:var(--text);position:absolute;top:0;left:0;right:0;bottom:0}
.cell-in:focus{background:#eff6ff;z-index:1}
.cell-in.num{text-align:right}
.cell-in.calc{background:#fefce8;color:#92400e;font-weight:500;text-align:right;cursor:default}
.cell-in.combo{cursor:text}
.row-btns{display:flex;gap:2px;justify-content:center;opacity:0;transition:opacity .1s}
tbody tr:hover .row-btns{opacity:1}
.rb{width:20px;height:20px;border:none;border-radius:3px;cursor:pointer;font-size:12px;line-height:1;display:flex;align-items:center;justify-content:center}
.rb.add{background:#dbeafe;color:var(--blue)}
.rb.del{background:#fee2e2;color:var(--red)}
/* Add row bar */
.add-bar{padding:6px;border-top:1px dashed var(--border);text-align:center;color:var(--muted);font-size:12px;cursor:pointer;transition:all .15s;flex-shrink:0}
.add-bar:hover{background:#eff6ff;color:var(--blue)}
/* Empty */
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-icon{font-size:48px;margin-bottom:12px}
/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:center;justify-content:center}
.modal{background:#fff;border-radius:12px;width:580px;max-width:95vw;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.modal-hd{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-title{font-size:15px;font-weight:600;color:var(--blue)}
.modal-close{font-size:18px;color:var(--muted);cursor:pointer;line-height:1;padding:2px 6px;border-radius:4px}
.modal-close:hover{background:#f1f5f9}
.modal-body{padding:16px 20px;overflow-y:auto;flex:1}
.modal-ft{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:center}
/* Col manager items */
.col-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:#f8fafc;border:1px solid var(--border);border-radius:6px;margin-bottom:6px;cursor:move}
.col-item:hover{border-color:var(--blue);background:#eff6ff}
.col-item.dragging{opacity:.4}
.col-item input{border:1px solid var(--border);border-radius:4px;padding:4px 8px;font-size:12px;outline:none}
.col-item input:focus{border-color:var(--blue)}
.col-badge{font-size:10px;padding:2px 6px;border-radius:10px;font-weight:600}
.badge-calc{background:#fef9c3;color:#92400e}
.badge-text{background:#f0fdf4;color:#166534}
.badge-num{background:#eff6ff;color:#1e40af}
.badge-combo{background:#fdf4ff;color:#7e22ce}
/* Paste modal */
.paste-area{width:100%;height:140px;border:1px solid var(--border);border-radius:6px;padding:10px;font-size:12px;resize:vertical;font-family:monospace}
.paste-area:focus{outline:none;border-color:var(--blue)}
/* Toast */
.toast{position:fixed;bottom:24px;right:24px;background:#1e293b;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;opacity:0;transform:translateY(8px);transition:all .25s;z-index:999;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.toast.ok{background:var(--green)}
.toast.err{background:var(--red)}
/* Drag highlight */
th.drag-over{background:#dbeafe!important}
/* Active cell highlight */
td.active-cell { background-color: #dbeafe !important; border: 2px solid #2563eb !important; padding: 0; }
</style>
</head>
<body>

<div class="hd">
  <div class="hd-title">Excel风格进销存管理系统</div>
  <div class="hd-info" id="save-info">未保存</div>
</div>
<div class="tabs" id="tabs">
  <div class="tab active" data-tab="quote">报价</div>
  <div class="tab" data-tab="purchase">采购</div>
  <div class="tab" data-tab="inbound">入库</div>
  <div class="tab" data-tab="outbound">出库</div>
  <div class="tab" data-tab="summary">汇总</div>
</div>
<div class="tb">
  <button class="btn primary" onclick="addRows()">＋ 增行</button>
  <button class="btn" onclick="doPasteFromClipboard()">📋 粘贴</button>
  <div class="sep"></div>
  <button class="btn success" onclick="doSave()">💾 保存</button>
  <button class="btn" onclick="doExport()">📤 导出</button>
  <button class="btn" onclick="document.getElementById('imp').click()">📥 导入</button>
  <input id="imp" type="file" accept=".xlsx,.xls,.csv" style="display:none" onchange="doImport(this)">
  <div class="sep"></div>
  <button class="btn warn" onclick="openColMgr()">⚙ 列管理</button>
  <button class="btn danger" onclick="doClear()">🗑 清空</button>
</div>
<div class="main">
  <div class="stats" id="stats"></div>
  <div class="tbl-wrap">
    <div class="tbl-scroll">
      <table id="tbl"><thead id="thead"></thead><tbody id="tbody"></tbody></table>
    </div>
    <div class="add-bar" onclick="addRows()">＋ 点击增行</div>
  </div>
</div>
<div class="toast" id="toast"></div>
<!-- Paste Modal -->
<div class="overlay" id="paste-modal" style="display:none">
  <div class="modal" style="width:480px">
    <div class="modal-hd"><span class="modal-title">粘贴 Excel 数据</span><span class="modal-close" onclick="closePaste()">✕</span></div>
    <div class="modal-body">
      <p style="font-size:12px;color:#64748b;margin-bottom:8px">从 Excel 复制数据后粘贴到下方（Tab 分隔列，换行分隔行）</p>
      <textarea class="paste-area" id="paste-ta" placeholder="在此粘贴..."></textarea>
    </div>
    <div class="modal-ft">
      <button class="btn" onclick="closePaste()">取消</button>
      <button class="btn primary" onclick="confirmPaste()">确认粘贴</button>
    </div>
  </div>
</div>
<!-- Col Manager Modal -->
<div class="overlay" id="col-modal" style="display:none">
  <div class="modal">
    <div class="modal-hd"><span class="modal-title">列管理</span><span class="modal-close" onclick="closeColMgr()">✕</span></div>
    <div class="modal-body" id="col-list"></div>
    <div class="modal-ft">
      <input id="new-col-name" placeholder="新列名称" style="flex:1;border:1px solid #e2e8f0;border-radius:6px;padding:7px 10px;font-size:12px;outline:none">
      <button class="btn primary" onclick="addCol()">＋ 添加</button>
      <button class="btn" onclick="closeColMgr()">取消</button>
      <button class="btn success" onclick="saveColMgr()">保存</button>
    </div>
  </div>
</div>

<script>

// ============================================================
// 数据模型
// ============================================================
const SCHEMAS = {
  quote: { cols: [
    {k:'date',      l:'日期',     t:'text',         w:75, fmt:'date'},
    {k:'owner',     l:'负责人',   t:'combo-owner',  w:55},
    {k:'brand',     l:'原厂',     t:'text',         w:70},
    {k:'partNo',    l:'料号',     t:'combo-partno', w:90},
    {k:'quote',     l:'报价',     t:'number',       w:80, fmt:'p4'},
    {k:'netCost',   l:'净成本',   t:'number',       w:80, fmt:'p4'},
    {k:'margin',    l:'毛利率',   t:'calc', f:'quote>0?(quote-netCost)/quote*100:0', w:60,  fmt:'pct'},
    {k:'listPrice', l:'官价',     t:'number',       w:80, fmt:'p4'},
    {k:'mpq',       l:'MPQ',      t:'number',       w:55, fmt:'int'},
    {k:'tp',        l:'TP',       t:'number',       w:80, fmt:'p4'},
    {k:'reqQty',    l:'需求数量', t:'number',       w:70,  fmt:'int'},
    {k:'note',      l:'备注',     t:'text',         w:100}
  ], rows:[] },
  purchase: { cols: [
    {k:'date',      l:'日期',       t:'text',           w:90, fmt:'date'},
    {k:'owner',     l:'负责人',     t:'combo-owner',    w:55},
    {k:'partNo',    l:'料号',       t:'combo-partno',   w:90},
    {k:'supplier',  l:'供应商',     t:'combo-supplier', w:80},
    {k:'reqQty',    l:'需求数',     t:'number',         w:60,  fmt:'int'},
    {k:'orderDate', l:'下单日期',   t:'text',           w:80,  fmt:'date'},
    {k:'purQty',    l:'采购数',     t:'number',         w:60,  fmt:'int'},
    {k:'purPrice',  l:'采购单价',   t:'number',         w:80,  fmt:'p4'},
    {k:'sellPrice', l:'销售单价',   t:'number',         w:80,  fmt:'p4'},
    {k:'purTotal',  l:'采购额',     t:'calc', f:'purQty*purPrice',  w:90,  fmt:'p2'},
    {k:'sellTotal', l:'销售额',     t:'calc', f:'purQty*sellPrice', w:90,  fmt:'p2'},
    {k:'margin',    l:'毛利率',     t:'calc', f:'sellPrice>0?(sellPrice-purPrice)/sellPrice*100:0', w:60, fmt:'pct'},
    {k:'note',      l:'备注',       t:'text',           w:90}
  ], rows:[] },
  inbound: { cols: [
    {k:'owner',     l:'负责人',   t:'combo-owner',    w:55},
    {k:'partNo',    l:'料号',     t:'combo-partno',   w:90},
    {k:'supplier',  l:'供应商',   t:'combo-supplier', w:80},
    {k:'inDate',    l:'收货日',   t:'text',           w:75, fmt:'date'},
    {k:'inQty',     l:'入库数量', t:'number',         w:70,  fmt:'int'},
    {k:'costPrice', l:'采购单价', t:'number',         w:80,  fmt:'p4'},
    {k:'costTotal', l:'采购额',   t:'calc', f:'inQty*costPrice', w:90, fmt:'p2'},
    {k:'note',      l:'备注',     t:'text',           w:100}
  ], rows:[] },
  outbound: { cols: [
    {k:'owner',        l:'负责人',   t:'combo-owner',    w:55},
    {k:'partNo',       l:'料号',     t:'combo-partno',   w:90},
    {k:'supplier',     l:'供应商',   t:'combo-supplier', w:80},
    {k:'outDate',      l:'出货日',   t:'text',           w:75, fmt:'date'},
    {k:'outQty',       l:'出货数量', t:'number',         w:70,  fmt:'int'},
    {k:'sellPrice',    l:'销售单价', t:'number',         w:80,  fmt:'p4'},
    {k:'sellTotal',    l:'销售额',   t:'calc', f:'outQty*sellPrice', w:90, fmt:'p2'},
    {k:'costPriceRef', l:'参考成本', t:'number',         w:80,  fmt:'p4'},
    {k:'margin',       l:'毛利率',   t:'calc', f:'sellPrice>0?(sellPrice-costPriceRef)/sellPrice*100:0', w:60, fmt:'pct'},
    {k:'stock',        l:'库存数量', t:'calc', f:'getOutboundStock(partNo)', w:70, fmt:'int'},
    {k:'note',         l:'备注',     t:'text',           w:90}
  ], rows:[] },
  summary: { cols: [
    {k:'owner',    l:'负责人', t:'text', w:55},
    {k:'partNo',   l:'料号',   t:'text', w:90},
    {k:'supplier', l:'供应商', t:'text', w:80},
    {k:'purQty',   l:'采购数', t:'text', w:65},
    {k:'purTotal', l:'采购额', t:'text', w:90},
    {k:'inQty',    l:'入库数', t:'text', w:65},
    {k:'inTotal',  l:'入库额', t:'text', w:90},
    {k:'outQty',   l:'出库数', t:'text', w:65},
    {k:'sellTotal',l:'销售额', t:'text', w:90},
    {k:'pending',  l:'未入库', t:'text', w:65},
    {k:'stock',    l:'库存',   t:'text', w:65}
  ], rows:[] }
};

const STORAGE_KEY = 'rs-erp-v7';
let DB = { tab:'quote', data:{}, opts:{owners:[], suppliers:[], partNos:[]}, lastSave:null };
let dragColIdx = -1, cmDragIdx = -1;
let currentCell = { row: -1, col: -1 }; // 当前单元格位置

// ============================================================
// 格式化
// ============================================================
function fmtDisp(v, fmt) {
  if (v === null || v === undefined || v === '') return '';
  if (fmt === 'date') {
    // 日期格式：支持 Excel 序列号、字符串
    if (typeof v === 'number' && v > 10000) {
      // Excel 日期序列号转换
      const d = new Date(Math.round((v - 25569) * 86400 * 1000));
      return d.toLocaleDateString('zh-CN', {year:'numeric',month:'2-digit',day:'2-digit'});
    }
    // 字符串日期直接返回
    return String(v);
  }
  const n = Number(v);
  if (isNaN(n)) return String(v);
  switch(fmt) {
    case 'p4':  return '$' + n.toLocaleString('en-US',{minimumFractionDigits:4,maximumFractionDigits:4});
    case 'p2':  return '$' + n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
    case 'int': return Math.round(n).toLocaleString('en-US');
    case 'pct': return n.toFixed(2) + '%';
    default:    return String(v);
  }
}
function fmtEdit(v, fmt) {
  if (v === null || v === undefined || v === '') return '';
  const n = Number(v);
  if (isNaN(n)) return String(v);
  switch(fmt) {
    case 'p4':  return n.toFixed(4);
    case 'p2':  return n.toFixed(2);
    case 'int': return Math.round(n).toString();
    case 'pct': return n.toFixed(2);
    default:    return String(v);
  }
}
function parseNum(v) {
  if (v === null || v === undefined || v === '') return 0;
  return parseFloat(String(v).replace(/[$,%,]/g,'').replace(/,/g,'')) || 0;
}
function parseDate(v) {
  if (!v) return '';
  
  // 如果是数字（可能是Excel序列号），转换为日期
  if (typeof v === 'number' && v > 10000) {
    const d = new Date(Math.round((v - 25569) * 86400 * 1000));
    return d.toLocaleDateString('zh-CN', {year:'numeric',month:'2-digit',day:'2-digit'});
  }
  
  // 如果是字符串，尝试解析各种格式
  if (typeof v === 'string') {
    // 去除空白字符
    v = v.trim();
    if (!v) return '';
    
    // 尝试解析常见日期格式
    const dateStr = v.replace(/[年月]/g, '-').replace(/[日]/g, '');
    const dateObj = new Date(dateStr);
    
    if (!isNaN(dateObj.getTime())) {
      return dateObj.toLocaleDateString('zh-CN', {year:'numeric',month:'2-digit',day:'2-digit'});
    }
    
    // 如果解析失败，返回原始值
    return v;
  }
  
  return String(v);
}
function calcCell(row, col) {
  if (!col.f) return null;
  try {
    // 特殊函数：getOutboundStock(partNo) 直接调用
    if (col.f.startsWith('getOutboundStock(')) {
      const partNo = row['partNo'] || '';
      return getOutboundStock(partNo);
    }
    let expr = col.f;
    Object.keys(row).forEach(k => {
      const val = typeof row[k] === 'string' ? (parseFloat(row[k]) || 0) : (Number(row[k]) || 0);
      expr = expr.replace(new RegExp('\\b' + k + '\\b', 'g'), val);
    });
    return Function('"use strict";return(' + expr + ')')();
  } catch(e) { return null; }
}

// 出库页库存计算函数：入库总数 - 该料号所有出库数
function getOutboundStock(partNo) {
  if (!partNo) return 0;
  // 统计入库表中该料号的入库总数
  let inTotal = 0;
  (DB.data.inbound.rows || []).forEach(r => {
    if (r.partNo === partNo) {
      inTotal += parseNum(r.inQty);
    }
  });
  // 统计出库表中该料号的出库总数（排除当前行的计算）
  let outTotal = 0;
  (DB.data.outbound.rows || []).forEach(r => {
    if (r.partNo === partNo) {
      outTotal += parseNum(r.outQty);
    }
  });
  return inTotal - outTotal;
}

// ============================================================
// 存储
// ============================================================
function loadDB() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    if (!s) return initDB();
    const p = JSON.parse(s);
    DB.lastSave = p.lastSave;
    if (p.opts) DB.opts = Object.assign({owners:[],suppliers:[],partNos:[]}, p.opts);
    // 列定义始终用最新 SCHEMAS，只保留 rows
    Object.keys(SCHEMAS).forEach(t => {
      DB.data[t] = {
        cols: JSON.parse(JSON.stringify(SCHEMAS[t].cols)),
        rows: (p.data && p.data[t] && p.data[t].rows) ? p.data[t].rows : []
      };
    });
  } catch(e) { initDB(); }
}
function initDB() {
  Object.keys(SCHEMAS).forEach(t => { DB.data[t] = JSON.parse(JSON.stringify(SCHEMAS[t])); });
}
function saveDB(silent) {
  // 收集 opts
  const pur = DB.data.purchase.rows || [];
  const oSet = new Set(), sSet = new Set(), pSet = new Set();
  pur.forEach(r => {
    if (r.owner && r.owner.trim()) oSet.add(r.owner.trim());
    if (r.supplier && r.supplier.trim()) sSet.add(r.supplier.trim());
    if (r.partNo && r.partNo.trim()) pSet.add(r.partNo.trim());
  });
  DB.opts.owners = [...oSet].sort();
  DB.opts.suppliers = [...sSet].sort();
  DB.opts.partNos = [...pSet].sort();
  DB.lastSave = new Date().toISOString();
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ data: DB.data, opts: DB.opts, lastSave: DB.lastSave }));
  if (!silent) { toast('已保存', 'ok'); updateSaveInfo(); }
}
function autoSave() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ data: DB.data, opts: DB.opts, lastSave: DB.lastSave }));
}

// ============================================================
// 渲染
// ============================================================
function renderAll() { 
  renderTabs(); 
  renderTable(); 
  renderStats(); 
  updateSaveInfo(); 
  // 恢复焦点到当前单元格
  if (currentCell.row >= 0 && currentCell.col >= 0) {
    setTimeout(() => {
      focusCell(currentCell.row, currentCell.col);
    }, 100);
  }
}

function renderTabs() {
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === DB.tab);
    t.onclick = () => { 
      DB.tab = t.dataset.tab;

function renderStats() {
  const el = document.getElementById('stats');
  const icons = {quote:'💬', purchase:'🛒', inbound:'📦', outbound:'🚚', summary:'📊'};
  const names = {quote:'报价', purchase:'采购', inbound:'入库', outbound:'出库', summary:'汇总'};

  ).join('');
}

function renderTable() {
  const schema = DB.data[DB.tab];
  const cols = schema.cols;
  const rows = schema.rows || [];
  const isSummary = DB.tab === 'summary';

  // thead
  let th = '<tr><th class="th-num"><div class="th-inner"><span class="th-letter">#</span></div></th>';
  cols.forEach((c, ci) => {
    const isCalc = c.t === 'calc';
    th += `<th class="th-col${isCalc?' th-calc':''}" style="min-width:${c.w}px; width:${c.w}px;" draggable="true"
      ondragstart="colDragStart(event,${ci})" ondragover="colDragOver(event,${ci})" ondragleave="colDragLeave(event)" ondrop="colDrop(event,${ci})"
      oncontextmenu="colMenu(event,${ci})">
      <div class="th-inner">
        <span class="th-letter">${String.fromCharCode(65+ci)}</span>
        <input class="th-input" value="${esc(c.l)}" onchange="renameCol(${ci},this.value)" onclick="event.stopPropagation()" ${isSummary?'readonly':''} />
      </div>
    </th>`;
  });
  th += '<th class="th-ops"><div class="th-inner"><span class="th-letter">ops</span></div></th></tr>';
  document.getElementById('thead').innerHTML = th;

  // tbody
  if (!rows.length) {
    document.getElementById('tbody').innerHTML =
      `<tr><td colspan="${cols.length+2}" class="empty"><div class="empty-icon">📋</div>暂无数据，点击「增行」或粘贴 Excel 数据</td></tr>`;
    return;
  }

  let tb = '';
  rows.forEach((row, ri) => {
    tb += `<tr><td class="td-num">${ri+1}</td>`;
    cols.forEach((c, ci) => {
      const val = row[c.k] !== undefined ? row[c.k] : '';
      
      if (c.t === 'calc') {
        const cv = calcCell(row, c);
        const dv = cv !== null ? fmtDisp(cv, c.fmt) : '-';
        tb += `<td style="min-width:${c.w}px; width:${c.w}px;"><input class="cell-in calc" value="${esc(dv)}" readonly /></td>`;
      } else if (c.t === 'combo-owner' || c.t === 'combo-supplier' || c.t === 'combo-partno') {
        const dlId = `dl-${c.t}-${ri}-${ci}`;
        const opts = c.t==='combo-owner' ? DB.opts.owners : c.t==='combo-supplier' ? DB.opts.suppliers : DB.opts.partNos;
        const dlOpts = opts.map(o => `<option value="${esc(o)}">`).join('');
        tb += `<td style="min-width:${c.w}px; width:${c.w}px;">
          <input class="cell-in combo" list="${dlId}" value="${esc(val)}"
            onchange="cellChange(this,${ri},'${c.k}')" 
            onclick="selectCell(${ri},${ci})"
            onfocus="selectCell(${ri},${ci})"
            onkeydown="handleCellKeydown(event,${ri},${ci})" />
          <datalist id="${dlId}">${dlOpts}</datalist>
        </td>`;
      } else {
        const isNum = c.t === 'number';
        const isDate = c.fmt === 'date';
        
        if (isDate) {
          // 日期类型特殊处理
          const disp = fmtDisp(val, 'date');
          tb += `<td style="min-width:${c.w}px; width:${c.w}px;">
            <input class="cell-in" type="text" value="${esc(disp)}"
              data-key="${c.k}" data-fmt="date"
              onchange="cellChange(this,${ri},'${c.k}')"
              onclick="selectCell(${ri},${ci})"
              onfocus="selectCell(${ri},${ci})"
              onkeydown="handleCellKeydown(event,${ri},${ci})" />
          </td>`;
        } else {
          const disp = isNum && c.fmt ? fmtDisp(val===''?'':val, c.fmt) : esc(val);
          const raw  = isNum ? (val===''?'':fmtEdit(val, c.fmt)) : esc(val);
          tb += `<td style="min-width:${c.w}px; width:${c.w}px;"
            onclick="selectCell(${ri},${ci})"
            onfocus="selectCell(${ri},${ci})"
            onkeydown="handleCellKeydown(event,${ri},${ci})">
            <input class="cell-in${isNum?' num':''}" type="text" value="${disp}"
              data-raw="${raw}" data-fmt="${c.fmt||''}"
              onchange="cellChange(this,${ri},'${c.k}')"
              onfocus="${isNum?'focusNum(this)':''}"
              onblur="${isNum?'blurNum(this)':''}"
              onkeydown="handleCellKeydown(event,${ri},${ci})" />
          </td>`;
        }
      }
    });
    tb += `<td class="td-ops"><div class="row-btns">
      <button class="rb add" onclick="insertRow(${ri})" title="上方插入">+</button>
      <button class="rb del" onclick="delRow(${ri})" title="删除">×</button>
    </div></td></tr>`;
  });
  document.getElementById('tbody').innerHTML = tb;
}

function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ============================================================
// Excel风格单元格导航
// ============================================================
function selectCell(row, col) {
  // 移除之前的高亮
  const prevTd = document.querySelector('td.active-cell');
  if (prevTd) prevTd.classList.remove('active-cell');
  
  // 添加新的高亮
  const td = document.querySelector(`#tbody tr:nth-child(${row+1}) td:nth-child(${col+2})`);
  if (td) {
    td.classList.add('active-cell');
  }
  
  currentCell = { row, col };
}

function focusCell(row, col) {
  const input = document.querySelector(`#tbody tr:nth-child(${row+1}) td:nth-child(${col+2}) input`);
  if (input) {
    input.focus();
    input.select();
    selectCell(row, col);
  }
}

function moveCell(deltaRow, deltaCol) {
  if (currentCell.row < 0 || currentCell.col < 0) return;
  
  const schema = DB.data[DB.tab];
  const maxRow = (schema.rows || []).length - 1;
  const maxCol = schema.cols.length - 1;
  
  let newRow = currentCell.row + deltaRow;
  let newCol = currentCell.col + deltaCol;
  
  // 边界检查
  if (newRow < 0) newRow = 0;
  if (newRow > maxRow) newRow = maxRow;
  if (newCol < 0) newCol = 0;
  if (newCol > maxCol) newCol = maxCol;
  
  focusCell(newRow, newCol);
}

function handleCellKeydown(e, row, col) {
  // 阻止默认行为
  if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Enter', 'Tab'].includes(e.key)) {
    e.preventDefault();
  }
  
  switch(e.key) {
    case 'ArrowUp':
      moveCell(-1, 0);
      break;
    case 'ArrowDown':
      moveCell(1, 0);
      break;
    case 'ArrowLeft':
      moveCell(0, -1);
      break;
    case 'ArrowRight':
      moveCell(0, 1);
      break;
    case 'Enter':
      // Enter 键向下移动
      moveCell(1, 0);
      break;
    case 'Tab':
      // Tab 键向右移动
      moveCell(0, 1);
      break;
    case 'F2':
      // F2 编辑单元格
      const input = e.target;
      setTimeout(() => input.select(), 10);
      break;
    case 'Delete':
    case 'Backspace':
      // 清空单元格内容
      if (e.target.tagName === 'INPUT') {
        e.target.value = '';
        cellChange(e.target, row, schema.cols[col].k);
      }
      break;
  }
}

// 监听键盘事件
document.addEventListener('keydown', e => {
  // Ctrl+V 直接读粘贴板（Excel 数据直接粘贴）
  if (e.ctrlKey && e.key.toLowerCase() === 'v' && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') {
    e.preventDefault();
    doPasteFromClipboard();
  }
  
  if (e.ctrlKey && e.key === 's') {
    e.preventDefault();
    doSave();
  }
  
  // 方向键导航
  if (!e.ctrlKey && !e.altKey && !e.metaKey) {
    if (currentCell.row >= 0 && currentCell.col >= 0) {
      switch(e.key) {
        case 'ArrowUp': e.preventDefault(); moveCell(-1, 0); break;
        case 'ArrowDown': e.preventDefault(); moveCell(1, 0); break;
        case 'ArrowLeft': e.preventDefault(); moveCell(0, -1); break;
        case 'ArrowRight': e.preventDefault(); moveCell(0, 1); break;
        case 'Enter': e.preventDefault(); moveCell(1, 0); break;
        case 'Tab': e.preventDefault(); moveCell(0, 1); break;
      }
    }
  }
});

// ============================================================
// 单元格操作
// ============================================================
function focusNum(inp) {
  if (inp.dataset.fmt) { inp.value = inp.dataset.raw || ''; inp.select(); }
}
function blurNum(inp) {
  if (!inp.dataset.fmt) return;
  const v = parseNum(inp.value);
  inp.dataset.raw = fmtEdit(v, inp.dataset.fmt);
  inp.value = fmtDisp(v, inp.dataset.fmt);
}
function cellChange(inp, ri, key) {
  const schema = DB.data[DB.tab];
  const col = schema.cols.find(c => c.k === key);
  let val = inp.value;
  
  if (col && col.fmt === 'date') {
    // 日期字段特殊处理
    val = parseDate(val);
    inp.value = val;
  } else if (col && col.t === 'number') {
    val = parseNum(val);
    inp.dataset.raw = fmtEdit(val, col.fmt);
    inp.value = fmtDisp(val, col.fmt);
  }
  
  schema.rows[ri][key] = val;
  recalcRow(ri);
  autoSave();
}
function recalcRow(ri) {
  const schema = DB.data[DB.tab];
  const row = schema.rows[ri];
  schema.cols.forEach((c, ci) => {
    if (c.t !== 'calc') return;
    const cv = calcCell(row, c);
    const dv = cv !== null ? fmtDisp(cv, c.fmt) : '-';
    const tds = document.querySelectorAll(`#tbody tr:nth-child(${ri+1}) td:nth-child(${ci+2}) input`);
    if (tds[0]) tds[0].value = dv;
  });
}
function recalcAll() {
  const schema = DB.data[DB.tab];
  (schema.rows || []).forEach((_, ri) => recalcRow(ri));
}

// ============================================================
// 行操作
// ============================================================
function addRows() {
  if (DB.tab === 'summary') { calcSummary(); renderTable(); toast('汇总已刷新', 'ok'); return; }
  const schema = DB.data[DB.tab];
  const nr = {};
  schema.cols.forEach(c => { 
    if (c.fmt === 'date') {
      nr[c.k] = new Date().toLocaleDateString('zh-CN', {year:'numeric',month:'2-digit',day:'2-digit'});
    } else {
      nr[c.k] = c.t === 'number' ? 0 : '';
    }
  });
  schema.rows.push(nr);
  renderTable(); autoSave(); toast('已增加 1 行', 'ok');
  
  // 新增行后自动聚焦到最后一个单元格
  setTimeout(() => {
    const newRow = schema.rows.length - 1;
    focusCell(newRow, 0); // 聚焦到新行的第一个单元格
  }, 100);
}
function insertRow(ri) {
  const schema = DB.data[DB.tab];
  const nr = {};
  schema.cols.forEach(c => { 
    if (c.fmt === 'date') {
      nr[c.k] = new Date().toLocaleDateString('zh-CN', {year:'numeric',month:'2-digit',day:'2-digit'});
    } else {
      nr[c.k] = c.t === 'number' ? 0 : '';
    }
  });
  schema.rows.splice(ri, 0, nr);
  renderTable(); autoSave();
  
  // 插入行后聚焦到新行
  setTimeout(() => {
    focusCell(ri, 0);
  }, 100);
}
function delRow(ri) {
  if (!confirm('删除第 ' + (ri+1) + ' 行？')) return;
  DB.data[DB.tab].rows.splice(ri, 1);
  renderTable(); autoSave(); toast('已删除 1 行', 'ok');
  
  // 删除行后重新设置焦点
  setTimeout(() => {
    if (DB.data[DB.tab].rows.length > 0) {
      const newRow = ri < DB.data[DB.tab].rows.length ? ri : DB.data[DB.tab].rows.length - 1;
      focusCell(newRow, 0);
    } else {
      currentCell = { row: -1, col: -1 };
    }
  }, 100);
}
function doClear() {
  if (DB.tab === 'summary') { toast('汇总表不可清空', 'err'); return; }
  if (!confirm('清空当前表所有数据？')) return;
  DB.data[DB.tab].rows = [];
  renderTable(); autoSave(); toast('已清空', 'ok');
  currentCell = { row: -1, col: -1 };
}

// ============================================================
// 列操作
// ============================================================
function renameCol(ci, val) { DB.data[DB.tab].cols[ci].l = val; autoSave(); }
function colDragStart(e, ci) { dragColIdx = ci; e.target.classList.add('dragging'); }
function colDragOver(e, ci) { if (dragColIdx === ci) return; e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
function colDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
function colDrop(e, ci) {
  e.preventDefault(); e.currentTarget.classList.remove('drag-over');
  if (dragColIdx < 0 || dragColIdx === ci) return;
  const cols = DB.data[DB.tab].cols;
  const moved = cols.splice(dragColIdx, 1)[0];
  cols.splice(ci, 0, moved);
  dragColIdx = -1; renderTable(); autoSave();
}
let ctxColIdx = -1;
function colMenu(e, ci) {
  e.preventDefault(); e.stopPropagation();
  ctxColIdx = ci;
  const existing = document.getElementById('col-ctx');
  if (existing) existing.remove();
  const m = document.createElement('div');
  m.id = 'col-ctx';
  m.style.cssText = `position:fixed;left:${Math.min(e.clientX,window.innerWidth-160)}px;top:${Math.min(e.clientY,window.innerHeight-120)}px;background:#fff;border:1px solid #e2e8f0;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.15);z-index:200;min-width:140px;padding:4px 0`;
  m.innerHTML = `<div onclick="ctxRename()" style="padding:8px 14px;font-size:12px;cursor:pointer;color:#1e293b" onmouseover="this.style.background='#f1f5f9'" onmouseout="this.style.background=''">✏️ 重命名</div>
    <div onclick="ctxDelete()" style="padding:8px 14px;font-size:12px;cursor:pointer;color:#dc2626" onmouseover="this.style.background='#fee2e2'" onmouseout="this.style.background=''">🗑 删除列</div>`;
  document.body.appendChild(m);
  document.addEventListener('click', () => m.remove(), { once: true });
}
function ctxRename() {
  const col = DB.data[DB.tab].cols[ctxColIdx];
  const n = prompt('列名称:', col.l);
  if (n && n !== col.l) { col.l = n; renderTable(); autoSave(); }
}
function ctxDelete() {
  const col = DB.data[DB.tab].cols[ctxColIdx];
  if (col.t === 'calc') { toast('计算列不可删除', 'err'); return; }
  if (!confirm('删除列「' + col.l + '」？')) return;
  const k = col.k;
  DB.data[DB.tab].cols.splice(ctxColIdx, 1);
  DB.data[DB.tab].rows.forEach(r => delete r[k]);
  renderTable(); autoSave();
}

// ============================================================
// 粘贴
// ============================================================
function doPasteFromClipboard() {
  try {
    navigator.clipboard.readText().then(text => {
      if (!text || !text.trim()) { 
        toast('粘贴板为空', 'err'); 
        return; 
      }
      importTextAsRows(text);
    }).catch(err => {
      // Clipboard API 被拒绝，降级用 textarea
      openPaste();
      toast('请在下方粘贴数据', 'warn');
    });
  } catch(e) {
    // 浏览器不支持 Clipboard API
    openPaste();
    toast('请在下方粘贴数据', 'warn');
  }
}

function importTextAsRows(text) {
  // 统一换行符
  const lines = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n').filter(l => l.length > 0);
  if (lines.length === 0) { toast('无有效数据', 'err'); return; }

  // 自动判断分隔符：Tab(Excel) > 逗号 > 分号
  let sep = '\t';
  if (!lines[0].includes('\t')) {
    sep = lines[0].includes(',') ? ',' : (lines[0].includes(';') ? ';' : '\t');
  }

  const schema = DB.data[DB.tab];
  let count = 0;

  lines.forEach(line => {
    const cells = line.split(sep);
    // 全空行跳过
    if (cells.every(c => c.trim() === '')) return;

    const nr = {};
    schema.cols.forEach((col, ci) => {
      if (col.t === 'calc') { nr[col.k] = ''; return; }
      let v = ci < cells.length ? cells[ci].trim() : '';
      
      // 特殊处理日期字段
      if (col.fmt === 'date' && v !== '') {
        v = parseDate(v);
      } else if (col.t === 'number' && v !== '') {
        v = parseNum(v);
      }
      
      nr[col.k] = v;
    });

    schema.rows.push(nr);
    count++;
  });

  renderTable(); recalcAll(); autoSave();
  toast('已粘贴 ' + count + ' 行', 'ok');
  
  // 粘贴完成后聚焦到最后一行
  setTimeout(() => {
    if (schema.rows.length > 0) {
      focusCell(schema.rows.length - 1, 0);
    }
  }, 100);
}

// 粘贴弹窗（备用方案）
function openPaste() {
  document.getElementById('paste-modal').style.display = 'flex';
  document.getElementById('paste-ta').value = '';
  document.getElementById('paste-ta').focus();
}
function closePaste() {
  document.getElementById('paste-modal').style.display = 'none';
}
function confirmPaste() {
  const text = document.getElementById('paste-ta').value;
  if (!text) { toast('请粘贴数据', 'err'); return; }
  importTextAsRows(text);
  closePaste();
}

// ============================================================
// 汇总
// ============================================================
function calcSummary() {
  const map = {};
  const key = r => (r.owner||'') + '|' + (r.partNo||'') + '|' + (r.supplier||'');
  const ensure = (k, r) => {
    if (!map[k]) map[k] = { owner: r.owner||'', partNo: r.partNo||'', supplier: r.supplier||'', purQty:0, purTotal:0, inQty:0, inTotal:0, outQty:0, sellTotal:0 };
  };
  (DB.data.purchase.rows||[]).forEach(r => {
    const k = key(r); ensure(k, r);
    map[k].purQty   += parseNum(r.purQty);
    map[k].purTotal += parseNum(r.purTotal) || parseNum(r.purQty) * parseNum(r.purPrice);
  });
  (DB.data.inbound.rows||[]).forEach(r => {
    const k = key(r); ensure(k, r);
    map[k].inQty   += parseNum(r.inQty);
    map[k].inTotal += parseNum(r.costTotal) || parseNum(r.inQty) * parseNum(r.costPrice);
  });
  (DB.data.outbound.rows||[]).forEach(r => {
    const k = key(r); ensure(k, r);
    map[k].outQty    += parseNum(r.outQty);
    map[k].sellTotal += parseNum(r.sellTotal) || parseNum(r.outQty) * parseNum(r.sellPrice);
  });
  DB.data.summary.rows = Object.values(map).map(m => ({
    owner:    m.owner,
    partNo:   m.partNo,
    supplier: m.supplier,
    purQty:   fmtDisp(m.purQty,   'int'),
    purTotal: fmtDisp(m.purTotal, 'p2'),
    inQty:    fmtDisp(m.inQty,    'int'),
    inTotal:  fmtDisp(m.inTotal,  'p2'),
    outQty:   fmtDisp(m.outQty,   'int'),
    sellTotal:fmtDisp(m.sellTotal,'p2'),
    pending:  fmtDisp(m.purQty - m.inQty, 'int'),
    stock:    fmtDisp(m.inQty - m.outQty, 'int')
  }));
}

// ============================================================
// 导入导出
// ============================================================
function doSave() { saveDB(false); }
function doExport() {
  const schema = DB.data[DB.tab];
  if (!schema.rows.length) { toast('无数据', 'err'); return; }
  const headers = schema.cols.map(c => c.l);
  const data = schema.rows.map(row => schema.cols.map(c => {
    if (c.t === 'calc') { const v = calcCell(row, c); return v !== null ? Number(v.toFixed(4)) : ''; }
    return row[c.k] !== undefined ? row[c.k] : '';
  }));
  const ws = XLSX.utils.aoa_to_sheet([headers, ...data]);
  const wb = XLSX.utils.book_new();
  const names = {quote:'报价',purchase:'采购',inbound:'入库',outbound:'出库',summary:'汇总'};
  XLSX.utils.book_append_sheet(wb, ws, names[DB.tab] || DB.tab);
  XLSX.writeFile(wb, (names[DB.tab]||DB.tab) + '_' + new Date().toLocaleDateString('zh-CN').replace(/\//g,'-') + '.xlsx');
  toast('导出成功', 'ok');
}
function doImport(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(new Uint8Array(e.target.result), { type:'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const json = XLSX.utils.sheet_to_json(ws, { header:1, defval:'' });
      if (json.length < 2) { toast('无数据', 'err'); return; }
      const schema = DB.data[DB.tab];
      let count = 0;
      for (let i = 1; i < json.length; i++) {
        const row = json[i];
        if (!row.some(v => v !== '')) continue;
        const nr = {};
        schema.cols.forEach((col, ci) => {
          let v = row[ci] !== undefined ? row[ci] : '';
          
          // 特殊处理日期字段
          if (col.fmt === 'date' && v !== '') {
            v = parseDate(v);
          } else if (col.t === 'number') {
            v = parseFloat(v) || 0;
          } else {
            v = String(v);
          }
          
          nr[col.k] = v;
        });
        schema.rows.push(nr); count++;
      }
      renderTable(); recalcAll(); autoSave();
      toast('已导入 ' + count + ' 行', 'ok');
      
      // 导入完成后聚焦到最后一行
      setTimeout(() => {
        if (schema.rows.length > 0) {
          focusCell(schema.rows.length - 1, 0);
        }
      }, 100);
    } catch(err) { toast('导入失败', 'err'); }
    input.value = '';
  };
  reader.readAsArrayBuffer(file);
}

// ============================================================
// 工具
// ============================================================
function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast' + (type ? ' ' + type : '');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}
function updateSaveInfo() {
  const el = document.getElementById('save-info');
  if (!el) return;
  el.textContent = DB.lastSave ? '已保存 ' + new Date(DB.lastSave).toLocaleTimeString('zh-CN') : '未保存';
}

// ============================================================
// 启动
// ============================================================
function init() { 
  loadDB(); 
  renderAll(); 
  
  // 默认聚焦到第一个单元格
  setTimeout(() => {
    if (DB.data[DB.tab].rows.length > 0) {
      focusCell(0, 0);
    }
  }, 200);
}
window.onload = init;

</script>
